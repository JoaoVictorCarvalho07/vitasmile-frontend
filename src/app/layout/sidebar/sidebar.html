<aside class="sidebar">
  <div class="sidebar__logo">
    <div class="sidebar__logo-name">
      <span class="sidebar__logo-vita">Vita</span><span class="sidebar__logo-smile">Smile</span>
    </div>
    <p class="sidebar__logo-sub">Dental Management</p>
  </div>

  <nav class="sidebar__nav">
    @if (isAdmin || isDentista) {
      <a routerLink="/dashboard" routerLinkActive="sidebar__item--active" class="sidebar__item">
        Dashboard
      </a>
    }
    <a routerLink="/consultas" routerLinkActive="sidebar__item--active" class="sidebar__item">
      Consultas
    </a>
    @if (isAdmin || isDentista) {
      <a routerLink="/pacientes" routerLinkActive="sidebar__item--active" class="sidebar__item">
        Pacientes
      </a>
    }
    @if (isAdmin) {
      <a routerLink="/dentistas" routerLinkActive="sidebar__item--active" class="sidebar__item">
        Dentistas
      </a>
      <a routerLink="/especialidades" routerLinkActive="sidebar__item--active" class="sidebar__item">
        Especialidades
      </a>
    }
    <a routerLink="/procedimentos" routerLinkActive="sidebar__item--active" class="sidebar__item">
      Procedimentos
    </a>
    @if (isAdmin) {
      <a routerLink="/relatorios" routerLinkActive="sidebar__item--active" class="sidebar__item">
        Relatórios
      </a>
      <a routerLink="/usuarios" routerLinkActive="sidebar__item--active" class="sidebar__item">
        Usuários
      </a>
    }
    <a routerLink="/contato" routerLinkActive="sidebar__item--active" class="sidebar__item">
      Contato
    </a>
  </nav>

  <div class="sidebar__footer">
    <button (click)="logout()" class="sidebar__logout">Sair</button>
  </div>
</aside>
