<div class="login-page">
  <div class="login-page__card">
    <div class="login-page__header">
      <h1 class="login-page__title">VitaSmile</h1>
      <p class="login-page__subtitle">Sistema de gestão odontológica</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-page__form">
      <div class="login-page__field">
        <label class="login-page__label" for="email">E-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          class="login-page__input"
          placeholder="seuemail@exemplo.com"
        />
      </div>

      <div class="login-page__field">
        <label class="login-page__label" for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          name="senha"
          [(ngModel)]="credentials.senha"
          required
          class="login-page__input"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="login-page__error">{{ error }}</p>
      }

      <button type="submit" [disabled]="loading || loginForm.invalid" class="login-page__btn">
        @if (loading) {
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>
  </div>
</div>
