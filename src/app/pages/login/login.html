<div class="min-h-screen flex items-center justify-center px-4" style="background: var(--surface)">

  <div class="bg-white w-full max-w-sm rounded-xl p-8" style="border: 1px solid var(--border)">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-medium" style="color: var(--indigo-700)">VitaSmile</h1>
      <p class="text-sm mt-1" style="color: var(--text-secondary)">Sistema de gestão odontológica</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="flex flex-col gap-5">

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium" style="color: var(--text-primary)">E-mail</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          class="w-full px-3 py-2.5 text-sm focus:outline-none focus:ring-2"
          style="border: 1px solid var(--border); border-radius: var(--radius-md); focus-ring-color: var(--indigo-500)"
          placeholder="seuemail@exemplo.com"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium" style="color: var(--text-primary)">Senha</label>
        <input
          type="password"
          name="senha"
          [(ngModel)]="credentials.senha"
          required
          class="w-full px-3 py-2.5 text-sm focus:outline-none focus:ring-2"
          style="border: 1px solid var(--border); border-radius: var(--radius-md)"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="text-sm" style="color: var(--danger)">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="loading || loginForm.invalid"
        class="w-full py-2.5 text-sm font-medium text-white transition-opacity disabled:opacity-50 mt-1"
        style="background: var(--indigo-700); border-radius: var(--radius-md)"
      >
        @if (loading) { Entrando... } @else { Entrar }
      </button>

    </form>

  </div>

</div>
