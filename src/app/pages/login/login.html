<div class="min-h-screen bg-indigo-50 flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-indigo-700">VitaSmile</h1>
      <p class="text-slate-500 mt-1 text-sm">Sistema de gestão odontológica</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="seuemail@exemplo.com"
        />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
        <input
          type="password"
          name="senha"
          [(ngModel)]="credentials.senha"
          required
          class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="text-red-500 text-sm mb-4">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="loading || loginForm.invalid"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-semibold py-2 rounded-lg transition-colors text-sm"
      >
        @if (loading) { Entrando... } @else { Entrar }
      </button>

    </form>

  </div>

</div>
